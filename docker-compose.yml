services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    command: sleep infinity
    depends_on:
      - db
      - mailhog # 👈 add this

  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_class_2_db
    volumes:
      - postgres_data_for_book_my_ticket:/var/lib/postgresql/data

  mailhog: # 👈 NEW SERVICE
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  postgres_data_for_book_my_ticket:
